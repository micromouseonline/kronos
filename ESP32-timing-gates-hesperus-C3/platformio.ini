[platformio]



[env:esp32-gate-c3]               ; Define the build environment for your ESP32-S3 board
platform = espressif32            ; Use the Espressif development platform
board = esp32-c3-devkitm-1        ; Base board config (closest match for ESP32-S3 Zero)
framework = arduino               ; Use Arduino framework for compatibility and simplicity

; Build flags to configure board behavior at compile time
build_flags =
  -I../common
  -D ARDUINO_USB_CDC_ON_BOOT=1    ; Enable USB CDC via USB Serial/JTAG peripheral at boot
  -D ARDUINO_USB_MODE=1           ; Enable HWCDC device mode (required for Serial on C3)
  -D CORE_DEBUG_LEVEL=0           ; Set verbose debug logging level (0–5)

board_upload.flash_size = 4MB     ; Set flash size for the board
board_build.partitions = default.csv ; Use default partition layout (can be customized)
; upload_port = COM28
; monitor_port = COM28
monitor_speed = 115200            ; Baud rate for serial monitor (must match Serial.begin)


; Additional library management
lib_extra_dirs = lib              ; Look for local libraries in the 'lib' folder
lib_deps =
    ; jchristensen/JC_Button @ ^2.1.5
    ; adafruit/Adafruit SSD1306 @ ^2.5.15 ; SSD1306 library from Adafruit (version 2.5.15 or newer)
    ; aki237/Adafruit_ESP32_SH1106 @ ^1.0.2 ; SH1106 library from Aki237 (version 1.0.2 or newer)
    ; adafruit/Adafruit GFX Library @ ^1.12.1 ; GFX library from Adafruit (version 1.12.1 or newer)
    

; Serial monitor filters - affects only the serial monitor - not the firmware
monitor_filters =
  ; time                          ; Optional: adds timestamp to each line of serial output
  ; default                       ; Removes terminal control characters
  ; direct                        ; Passes data through unchanged
  ; debug                         ; Shows both sent and received data
  ; hexlify                       ; Displays characters in hexadecimal
  ; log2file                      ; Saves output to a file
  ; nocontrol                     ; Removes all control characters from output
  ; printable                     ; Replaces non-printable characters with readable representations
  ; send_on_enter                 ; Sends predefined string when ENTER is pressed
    time                          ; Adds timestamps to each line of output
    esp32_exception_decoder       ; Decodes ESP32 crash dumps to source info
  ; esp8266_exception_decoder     ; Decodes ESP8266 crash dumps (for ESP8266 projects)
